name: device_apps
description: "Private Home Box — Flutter client."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local DB
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.29

  # Theming
  flex_color_scheme: ^8.4.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # WebSocket
  web_socket_channel: ^3.0.3

  # Crypto
  cryptography: ^2.7.0

  # Utils
  uuid: ^4.5.1
  drift_flutter: ^0.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
